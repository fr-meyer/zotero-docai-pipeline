# Tagging workflow configuration
selection:
  include:
    values:
      - docai
    operator: "or"
  exclude:
    values:
      - docai-processed
    operator: "or"
  conflict_resolution: "exclude_wins"

apply_on_success:
  values:
    - docai-processed
  mode: "append_all"

apply_on_error:
  values:
    - docai-error
  mode: "append_all"

include_abstract: false
