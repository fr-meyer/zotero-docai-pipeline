name: CodeRabbit PR comment trigger

# Source asset for a starter workflow.
# This canonical source file lives under templates/starter-workflows/ in the asset library.
# The uses: target below is a publication-target shape for a serving repo, not a claim
# that this source-library repo currently serves the reusable workflow at HEAD.
# If you publish or copy it later, keep the pinned reusable-workflow uses ref and the
# paired shared_repository_ref aligned.
#
# Setup notes after creating this workflow from the template:
# 1. This workflow is intentionally scoped to CodeRabbit-authored PR comments and review summaries only.
# 2. Configure repository or organization variables as needed:
#    - CODERABBIT_RUNNER_LABELS_JSON
#    - CODERABBIT_AGENT_RUNTIME
#    - CODERABBIT_AGENT_COMMAND_JSON or CODERABBIT_AGENT_COMMAND
#    - CODERABBIT_CLI (optional)
#    - CURSOR_CLI (optional)
#    - CODERABBIT_INSTALL_SHARED_SKILLS (optional, default true)
#    - CODERABBIT_INSTALL_CURSOR_RULES (optional, default true)
#    - CODERABBIT_SHARED_SKILLS_INSTALL_MODE (optional, default copy)
#    - CODERABBIT_AUTO_COMMIT (optional, default false)
#    - CODERABBIT_AUTO_PUSH (optional, default false)
#    - CODERABBIT_COMMIT_STRATEGY (optional, default single-commit)
#    - CODERABBIT_COMMIT_COUNT_MODE (optional, default auto)
#    - CODERABBIT_FIXED_COMMIT_COUNT (optional, default 1)
#    - CODERABBIT_STOP_ON_AMBIGUOUS_REMAINDER (optional, default true)
# 3. Configure repository or organization secrets as needed:
#    - CURSOR_API_KEY when CODERABBIT_AGENT_RUNTIME=cursor
#    - CODERABBIT_API_KEY only if you explicitly enable CodeRabbit CLI validation
#    - WORKFLOW_PUSH_TOKEN when remediation may need to push changes under .github/workflows/
# 4. The reusable workflow uses GITHUB_TOKEN as GH_TOKEN by default.

permissions:
  contents: read
  pull-requests: read
  actions: read

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: coderabbit-pr-comment-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-pr-context:
    if: ${{ github.event.sender.type == 'Bot' && github.event.sender.login == 'coderabbitai[bot]' && ((github.event_name == 'issue_comment' && github.event.issue.pull_request) || github.event_name == 'pull_request_review_comment' || (github.event_name == 'pull_request_review' && github.event.review.state == 'commented')) }}
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - name: Resolve PR number and fork status
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_ID: ${{ github.event.review.id }}
          REVIEW_STATE: ${{ github.event.review.state }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            pr_number="$ISSUE_NUMBER"
          elif [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            pr_number="$REVIEW_PR_NUMBER"
          else
            pr_number="$REVIEW_PR_NUMBER"

            review_comments_count="$(gh api "repos/$REPOSITORY/pulls/$pr_number/reviews/$REVIEW_ID/comments?per_page=1" --jq 'length')"
            if [[ "$REVIEW_STATE" != "commented" ]]; then
              echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ "$review_comments_count" != "0" ]]; then
              echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          pr_json=$(gh api "repos/$REPOSITORY/pulls/$pr_number")
          is_fork=$(jq -r '.head.repo.fork // false' <<<"$pr_json")

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          if [[ "$is_fork" == "true" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  coderabbit-pr-automation-comment:
    needs: resolve-pr-context
    if: ${{ needs.resolve-pr-context.outputs.should_run == 'true' }}
    permissions:
      contents: write
      pull-requests: read
      actions: read
    uses: fr-meyer/agent-toolkit/.github/workflows/coderabbit-pr-automation.yml@74ed944bc852e9446f076223659733d18b5f8f96
    with:
      pr_number: ${{ fromJSON(needs.resolve-pr-context.outputs.pr_number) }}
      run_validation: false
      working_tree_must_be_clean: true
      max_cycles: 3
      shared_repository_ref: 74ed944bc852e9446f076223659733d18b5f8f96
      runner_labels_json: ${{ vars.CODERABBIT_RUNNER_LABELS_JSON != '' && vars.CODERABBIT_RUNNER_LABELS_JSON || '["self-hosted"]' }}
      agent_runtime: ${{ vars.CODERABBIT_AGENT_RUNTIME != '' && vars.CODERABBIT_AGENT_RUNTIME || 'none' }}
      agent_command_json: ${{ vars.CODERABBIT_AGENT_COMMAND_JSON }}
      agent_command: ${{ vars.CODERABBIT_AGENT_COMMAND }}
      coderabbit_cli: ${{ vars.CODERABBIT_CLI }}
      cursor_cli: ${{ vars.CURSOR_CLI }}
      install_shared_skills: ${{ fromJSON(vars.CODERABBIT_INSTALL_SHARED_SKILLS || 'true') }}
      install_cursor_rules: ${{ fromJSON(vars.CODERABBIT_INSTALL_CURSOR_RULES || 'true') }}
      shared_skills_install_mode: ${{ vars.CODERABBIT_SHARED_SKILLS_INSTALL_MODE || 'copy' }}
      auto_commit: ${{ fromJSON(vars.CODERABBIT_AUTO_COMMIT || 'false') }}
      auto_push: ${{ fromJSON(vars.CODERABBIT_AUTO_PUSH || 'false') }}
      commit_strategy: ${{ vars.CODERABBIT_COMMIT_STRATEGY || 'single-commit' }}
      commit_count_mode: ${{ vars.CODERABBIT_COMMIT_COUNT_MODE || 'auto' }}
      fixed_commit_count: ${{ fromJSON(vars.CODERABBIT_FIXED_COMMIT_COUNT || '1') }}
      stop_on_ambiguous_remainder: ${{ fromJSON(vars.CODERABBIT_STOP_ON_AMBIGUOUS_REMAINDER || 'true') }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
      WORKFLOW_PUSH_TOKEN: ${{ secrets.WORKFLOW_PUSH_TOKEN }}
