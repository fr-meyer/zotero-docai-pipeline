name: CodeRabbit PR automation wrapper

# Draft GitHub workflow template for consumer repositories.
#
# Setup notes after creating this workflow from the template:
# 1. Ensure the reusable workflow reference below points at the desired shared repo/ref.
# 2. Configure repository or organization variables as needed:
#    - CODERABBIT_RUNNER_LABELS_JSON
#    - CODERABBIT_AGENT_RUNTIME
#    - CODERABBIT_AGENT_COMMAND_JSON or CODERABBIT_AGENT_COMMAND
#    - CODERABBIT_CLI (optional)
#    - CURSOR_CLI (optional)
# 3. Configure repository or organization secrets as needed:
#    - CURSOR_API_KEY when CODERABBIT_AGENT_RUNTIME=cursor
#    - CODERABBIT_API_KEY only if you explicitly enable CodeRabbit CLI validation
# 4. The reusable workflow uses GITHUB_TOKEN as GH_TOKEN by default.

permissions:
  contents: read
  pull-requests: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect
        required: true
        type: number
      run_validation:
        description: Whether to run validation after remediation
        required: false
        type: boolean
        default: false
      working_tree_must_be_clean:
        description: Whether the target checkout must be clean before remediation
        required: false
        type: boolean
        default: true
      max_cycles:
        description: Maximum bounded remediation cycles
        required: false
        type: number
        default: 3
      shared_repository_ref:
        description: Branch, tag, or SHA of the shared toolkit workflow to use
        required: false
        type: string
        default: main

  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coderabbit-pr-automation-dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: fr-meyer/agent-toolkit/.github/workflows/coderabbit-pr-automation.yml@main
    with:
      pr_number: ${{ fromJSON(inputs.pr_number) }}
      run_validation: ${{ inputs.run_validation }}
      working_tree_must_be_clean: ${{ inputs.working_tree_must_be_clean }}
      max_cycles: ${{ fromJSON(inputs.max_cycles) }}
      shared_repository_ref: ${{ inputs.shared_repository_ref }}
      runner_labels_json: ${{ vars.CODERABBIT_RUNNER_LABELS_JSON != '' && vars.CODERABBIT_RUNNER_LABELS_JSON || '["self-hosted"]' }}
      agent_runtime: ${{ vars.CODERABBIT_AGENT_RUNTIME != '' && vars.CODERABBIT_AGENT_RUNTIME || 'none' }}
      agent_command_json: ${{ vars.CODERABBIT_AGENT_COMMAND_JSON }}
      agent_command: ${{ vars.CODERABBIT_AGENT_COMMAND }}
      coderabbit_cli: ${{ vars.CODERABBIT_CLI }}
      cursor_cli: ${{ vars.CURSOR_CLI }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}

  coderabbit-pr-automation-pr:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
    uses: fr-meyer/agent-toolkit/.github/workflows/coderabbit-pr-automation.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      run_validation: false
      working_tree_must_be_clean: true
      max_cycles: 3
      shared_repository_ref: main
      runner_labels_json: ${{ vars.CODERABBIT_RUNNER_LABELS_JSON != '' && vars.CODERABBIT_RUNNER_LABELS_JSON || '["self-hosted"]' }}
      agent_runtime: ${{ vars.CODERABBIT_AGENT_RUNTIME != '' && vars.CODERABBIT_AGENT_RUNTIME || 'none' }}
      agent_command_json: ${{ vars.CODERABBIT_AGENT_COMMAND_JSON }}
      agent_command: ${{ vars.CODERABBIT_AGENT_COMMAND }}
      coderabbit_cli: ${{ vars.CODERABBIT_CLI }}
      cursor_cli: ${{ vars.CURSOR_CLI }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}